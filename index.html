<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>餐飲 POS V2.1.23</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/pos.css">
  <link rel="stylesheet" href="styles/orders.css">
  <link rel="stylesheet" href="styles/reports.css">
  <link rel="stylesheet" href="styles/products.css">
  <link rel="stylesheet" href="styles/settings.css">
</head>
<body>

<!-- ===== 側邊導覽列 ===== -->
<aside class="sidebar">
  <button class="nav-btn active" data-view="posView">點餐</button>
  <button class="nav-btn" data-view="ordersView">訂單查詢</button>
  <button class="nav-btn" data-view="reportsView">報表</button>
  <button class="nav-btn" data-view="productsView">商品管理</button>
  <button class="nav-btn" data-view="settingsView">設定</button>
</aside>

<!-- ===== 主要內容區 ===== -->
<main class="main">

  <!-- ========== POS 點餐頁 ========== -->
  <section id="posView" class="view active">
    <div class="pos-layout">

      <!-- 左側：商品選擇區 -->
      <div class="pos-left">
        <!-- 單別選擇 -->
        <div class="order-type-bar row gap wrap">
          <button class="order-type-btn active" data-type="dineIn">內用</button>
          <button class="order-type-btn" data-type="takeOut">外帶</button>
          <button class="order-type-btn" data-type="delivery">外送</button>
        </div>

        <!-- 桌號/單號輸入 -->
        <div class="row gap wrap" style="margin-bottom:8px;">
          <input id="tableInput" class="form-input" placeholder="桌號 / 單號" style="max-width:180px;">
        </div>

        <!-- 商品搜尋 -->
        <div class="row gap wrap" style="margin-bottom:8px;">
          <input id="productSearch" class="form-input" placeholder="搜尋商品名稱或別名…">
        </div>

        <!-- 分類標籤列 -->
        <div id="categoryTabs" class="category-tabs"></div>

        <!-- 商品按鈕網格 -->
        <div id="productGrid" class="product-grid"></div>
      </div>

      <!-- 右側：購物車 -->
      <div class="pos-right">
        <h2 class="cart-title">目前點餐</h2>
        <div id="cartList" class="cart-list"></div>

        <div class="cart-footer">
          <div class="row between"><span>小計</span><span id="subtotal">$0</span></div>

          <!-- 折扣控制 -->
          <div class="discount-bar row gap wrap">
            <select id="discountType" class="form-select small-select">
              <option value="none">無折扣</option>
              <option value="percent">% 折扣</option>
              <option value="fixed">固定折讓</option>
            </select>
            <input id="discountValue" class="form-input small-input" type="number" min="0" placeholder="0" style="width:80px;">
          </div>

          <div class="row between total-row"><span>合計</span><span id="totalAmount">$0</span></div>

          <div class="row gap wrap">
            <button id="checkoutBtn" class="primary-btn flex1">結帳</button>
            <button id="printReceiptBtn" class="secondary-btn">印顧客單</button>
            <button id="printKitchenBtn" class="secondary-btn">印廚房單</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== 訂單查詢頁 ========== -->
  <section id="ordersView" class="view">
    <h1>訂單查詢</h1>

    <!-- 篩選列 -->
    <div class="filters row gap wrap">
      <input id="orderItemSearch" class="form-input" placeholder="搜尋品項…">
      <input id="orderDateStart" class="form-input" type="date">
      <input id="orderDateEnd" class="form-input" type="date">
      <input id="orderAmountMin" class="form-input" type="number" placeholder="最低金額" style="width:100px;">
      <input id="orderAmountMax" class="form-input" type="number" placeholder="最高金額" style="width:100px;">
      <select id="orderPaymentFilter" class="form-select">
        <option value="">全部付款方式</option>
        <option value="cash">現金</option>
        <option value="card">刷卡</option>
        <option value="mobile">行動支付</option>
        <option value="transfer">轉帳</option>
      </select>
    </div>

    <!-- 線上待確認訂單 -->
    <h2>線上待確認</h2>
    <div id="pendingOnlineOrders" class="order-list"></div>

    <!-- 待付款訂單 -->
    <h2>待付款</h2>
    <div id="unpaidOrders" class="order-list"></div>

    <!-- 已完成訂單 -->
    <h2>已完成</h2>
    <div id="completedOrders" class="order-list"></div>
  </section>

  <!-- ========== 報表頁 ========== -->
  <section id="reportsView" class="view">
    <h1>報表</h1>
    <div class="row gap wrap" style="margin-bottom:12px;">
      <button id="reportStartBtn" class="secondary-btn">開始營業</button>
      <button id="reportEndBtn" class="danger-btn">結束營業</button>
    </div>
    <div class="row gap wrap" style="margin-bottom:12px;">
      <input id="reportDateStart" class="form-input" type="date">
      <input id="reportDateEnd" class="form-input" type="date">
      <button id="exportReportBtn" class="secondary-btn">匯出報表</button>
      <button id="saveReportBtn" class="secondary-btn">儲存報表</button>
    </div>
    <div class="report-cards">
      <div class="card"><h3>熱銷商品</h3><div id="topProducts"></div></div>
      <div class="card"><h3>付款方式統計</h3><div id="paymentStats"></div></div>
      <div class="card"><h3>商品販賣分析</h3><div id="sales
